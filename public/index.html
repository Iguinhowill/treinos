<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8C2135">
  <title>IFlorense Treinos | Meia Maratona</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-theme="dark">
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/" aria-label="IFlorense Treinos">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 80 80" role="img">
            <path d="M10 0H70L80 10V70L70 80H10L0 70V10Z"></path>
            <rect x="16" y="15" width="10" height="50"></rect>
            <rect x="16" y="15" width="40" height="10"></rect>
            <rect x="16" y="37" width="28" height="9"></rect>
            <rect class="icon-dot" x="55" y="56" width="8" height="8"></rect>
          </svg>
        </span>
        <span class="brand-wordmark">
          <span class="brand-if">IF</span><span class="brand-rest">lorense</span>
        </span>
      </a>

      <div class="page-title">
        <p>Plano 21,1 km</p>
        <h1>Diário de treinos</h1>
      </div>

      <div class="theme-toggle" aria-label="Selecionar tema">
        <button class="theme-button" type="button" data-theme-option="light">White</button>
        <button class="theme-button" type="button" data-theme-option="dark">Dark</button>
      </div>
    </header>

    <main>
      <section class="dashboard-band" aria-labelledby="dashboard-title">
        <div class="dashboard-head">
          <div>
            <p class="section-kicker">Acompanhamento</p>
            <h2 id="dashboard-title">Ciclo até 12/08/2026</h2>
          </div>
          <div class="target-chip">
            <span>Meta</span>
            <strong>21,1 km</strong>
          </div>
        </div>

        <div class="metric-grid" id="metrics"></div>

        <div class="progress-panel">
          <div class="progress-copy">
            <span id="progressLabel">0% por km</span>
            <strong id="progressKm">0 de 279,6 km</strong>
          </div>
          <div class="progress-track" aria-hidden="true">
            <span id="progressBar"></span>
          </div>
        </div>
      </section>

      <section class="workspace-grid">
        <aside class="log-panel" aria-labelledby="log-title">
          <div class="panel-head">
            <div>
              <p class="section-kicker">Lançamento</p>
              <h2 id="log-title">Registrar treino</h2>
            </div>
            <span class="save-state" id="saveState">Pronto</span>
          </div>

          <form id="trainingForm" class="training-form">
            <label class="field">
              <span>Treino</span>
              <select id="trainingSelect" name="trainingSelect"></select>
            </label>

            <fieldset class="status-field">
              <legend>Status</legend>
              <div class="status-options">
                <button type="button" data-status-option="Realizado">Realizado</button>
                <button type="button" data-status-option="Pulado">Pulado</button>
                <button type="button" data-status-option="Pendente">Pendente</button>
              </div>
            </fieldset>

            <div class="form-grid">
              <label class="field">
                <span>Km realizados</span>
                <input id="kmRealizados" name="kmRealizados" type="number" min="0" step="0.01" inputmode="decimal">
              </label>

              <label class="field">
                <span>Tempo real (min)</span>
                <input id="tempoRealMin" name="tempoRealMin" type="number" min="0" step="0.1" inputmode="decimal">
              </label>

              <label class="field">
                <span>FC média</span>
                <input id="fcMedia" name="fcMedia" type="number" min="0" step="1" inputmode="numeric">
              </label>

              <label class="field">
                <span>Data realizada</span>
                <input id="realizadoEm" name="realizadoEm" type="date">
              </label>
            </div>

            <label class="field">
              <span>Notas</span>
              <textarea id="notas" name="notas" rows="4" maxlength="700"></textarea>
            </label>

            <div class="form-actions">
              <button class="primary-action" type="submit">Salvar lançamento</button>
              <button class="ghost-action" type="button" id="resetButton">Limpar status</button>
            </div>
          </form>
        </aside>

        <section class="plan-panel" aria-labelledby="plan-title">
          <div class="panel-head plan-head">
            <div>
              <p class="section-kicker">Plano</p>
              <h2 id="plan-title">Treinos previstos</h2>
            </div>

            <div class="filters" aria-label="Filtros de status">
              <button type="button" data-filter="todos">Todos</button>
              <button type="button" data-filter="pendentes">Pendentes</button>
              <button type="button" data-filter="realizados">Realizados</button>
              <button type="button" data-filter="pulados">Pulados</button>
            </div>
          </div>

          <div class="search-row">
            <label class="field search-field">
              <span>Buscar</span>
              <input id="searchInput" type="search" placeholder="Tipo, semana, treino...">
            </label>

            <label class="field week-field">
              <span>Semana</span>
              <select id="weekFilter"></select>
            </label>
          </div>

          <div class="week-strip" id="weekStrip"></div>
          <div class="training-list" id="trainingList"></div>
        </section>
      </section>
    </main>
  </div>

  <div class="auth-gate" id="authGate" hidden>
    <form class="auth-box" id="authForm">
      <div class="brand auth-brand" aria-hidden="true">
        <span class="brand-icon">
          <svg viewBox="0 0 80 80">
            <path d="M10 0H70L80 10V70L70 80H10L0 70V10Z"></path>
            <rect x="16" y="15" width="10" height="50"></rect>
            <rect x="16" y="15" width="40" height="10"></rect>
            <rect x="16" y="37" width="28" height="9"></rect>
            <rect class="icon-dot" x="55" y="56" width="8" height="8"></rect>
          </svg>
        </span>
        <span class="brand-wordmark">
          <span class="brand-if">IF</span><span class="brand-rest">lorense</span>
        </span>
      </div>

      <div>
        <p class="section-kicker">Acesso</p>
        <h2>Treinos privados</h2>
      </div>

      <label class="field">
        <span>Senha</span>
        <input id="passwordInput" type="password" autocomplete="current-password">
      </label>

      <p class="auth-message" id="authMessage">Informe a senha configurada na Vercel.</p>
      <button class="primary-action" type="submit">Entrar</button>
    </form>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="/app.js" defer></script>
</body>
</html>
